version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: film-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: film_db
    ports:
      - "3306:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

volumes:
  mysql_data: